# manifest.template.yaml — Multi-Project Registry Template
#
# SETUP INSTRUCTIONS (one-time, per machine):
#   1. Copy this file to manifest.yaml:
#        cp manifest.template.yaml manifest.yaml
#   2. Replace ALL occurrences of <YOUR_LOCAL_PATH> with the absolute path where
#      you cloned this repo (e.g. /Users/yourname/dev/agent-bootstrap).
#   3. Add your own projects in the section below.
#   4. manifest.yaml is gitignored — your local paths stay local.
#      manifest.template.yaml is tracked in git — team structure is shared.
#
# Agents parse manifest.yaml to instantly understand all projects they can work on.
# Use absolute paths only.
# Each project should have its own memory-bank/ following the 6-file standard.

version: 0.2.0
last_updated: 2026-04-28

projects:
  - name: agent-bootstrap
    path: <YOUR_LOCAL_PATH>
    description: |
      Universal agent harness repository itself. Defines reusable agents, skills,
      workflows, and manifest system. Self-hosting example.
    primary_tech: Markdown, YAML, Mermaid
    memory_bank_path: <YOUR_LOCAL_PATH>/memory-bank
    docs_path: docs/projects/agent-bootstrap
    notes: |
      This is the hub. All other projects inherit its AGENTS.md, skills, and agents.
      Use it as the base for any new project setup.

  # === ADD YOUR PROJECTS BELOW ===
  # Example for a typical app with release branches (inspired by the cherry-pick-to-release-branch skill in this hub):
  # - name: my-release-app
  #   path: /absolute/path/to/your/app
  #   description: Production web app with monthly release branches (e.g. releases/2026.03.24).
  #   primary_tech: Node.js, TypeScript, React, Vite
  #   memory_bank_path: /absolute/path/to/your/app/memory-bank
  #   docs_path: docs/projects/my-release-app
  #   notes: |
  #     Uses cherry-pick-to-release-branch skill for hotfixes.
  #     Version format: YYYY.MM.DD-build.N or -rc.N

  # Another example:
  # - name: internal-tools
  #   path: /path/to/internal-tools
  #   description: Collection of CLI and automation scripts.
  #   primary_tech: Python, Bash
  #   memory_bank_path: /path/to/internal-tools/memory-bank
  #   docs_path: docs/projects/internal-tools

# How agents use this:
# 1. At session start or "switch to project X":
#    - Load the project's memory_bank_path files (read all 6).
#    - Load the project's docs_path for technical reference (api-contracts, data-models, etc.).
#    - Set working directory context to path.
# 2. When task mentions a project not listed: Ask user to add it to manifest.yaml first.
# 3. For cross-project work: Load multiple memory-banks and doc paths as needed.
# 4. For team-wide standards: Read docs/shared/ in addition to project docs.

# Field reference:
#   name:             kebab-case unique identifier (used as directory key in docs/projects/)
#   path:             absolute local path to the project repo (update per machine)
#   description:      human + agent readable summary
#   primary_tech:     comma-separated tech stack
#   memory_bank_path: absolute path to the project's 6-file memory-bank/
#   docs_path:        relative path from repo root to project technical docs
#   notes:            (optional) free-form hints for agents

# Maintenance: After adding/updating projects, update memory-bank/ and docs/ as needed.
